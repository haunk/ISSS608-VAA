<div id="fish-layer" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden;"></div>

<style>
.fsh-wrap { position:absolute; pointer-events:none; }
.fsh-emoji { display:block; }
@keyframes swimRight { from{left:-70px} to{left:108%} }
@keyframes swimLeft  { from{left:108%}  to{left:-70px} }
@keyframes fishBob   { from{transform:translateY(0px)} to{transform:translateY(-12px)} }
</style>

<script>
(function(){
  if (!document.body.classList.contains('home-page')) return;
  var layer = document.getElementById('fish-layer');
  var FISH  = [
  'images/jellyfish.webp', //'🪼'
  'images/bluefish.webp', //'🐟'
  'images/lobster.webp', //'🦞'
  'images/whale.webp', //'🐳'
  'images/octopus.webp', //'🐙'
  'images/blowfish.webp', //'🐡'
  'images/bubble.webp',
  'images/seal.webp',
  'images/penguin.webp'
  ];

  function spawnSchool(){
    var n       = 4 + Math.floor(Math.random()*5);
    var right   = Math.random() > 0.35;
    var baseTop = 8  + Math.random()*74;
    var speed   = 18 + Math.random()*14;
    var emoji   = FISH[Math.floor(Math.random()*FISH.length)];
    var size    = 30 + Math.floor(Math.random()*12);

    for(var i=0;i<n;i++){
      (function(idx){
        var wrap = document.createElement('div');
        wrap.className = 'fsh-wrap';

        var span = document.createElement('img');
        span.className = 'fsh-emoji';
        span.src = emoji;
        span.style.width = size+'px';
        span.style.height = size+'px';
        if(right) span.style.transform = 'scaleX(-1)';
        wrap.appendChild(span); 

        wrap.style.top = (baseTop + (Math.random()*8-4))+'%';
        var delay = idx*0.4 + Math.random()*0.3;
        var dur   = speed + Math.random()*4;
        var bob   = 1.5 + Math.random()*1.5;
        wrap.style.animation =
          (right?'swimRight':'swimLeft')+' '+dur+'s '+delay+'s linear forwards, '+
          'fishBob '+bob+'s '+delay+'s ease-in-out infinite alternate';

        layer.appendChild(wrap);
        setTimeout(function(){ wrap.remove(); }, (dur+delay+2)*1000);
      })(i);
    }
  }

  setTimeout(spawnSchool, 800);
  setInterval(spawnSchool, 9000);
})();
</script>
